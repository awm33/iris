# Iris dev stack. Bring up with `just dev` (or: docker compose -f deploy/docker-compose.dev.yml up -d)
name: iris-dev

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: iris
      POSTGRES_PASSWORD: iris
      POSTGRES_DB: iris
    ports: ["15432:5432"] # high host port — 5432/5433 taken by other local stacks
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iris"]
      interval: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: iris
      MINIO_ROOT_PASSWORD: iris-dev-secret
    ports: ["9100:9000", "9101:9001"] # host 9100/9101 — 9000/9001 commonly taken
    volumes: [miniodata:/data]

  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 iris iris-dev-secret; do sleep 1; done;
      mc mb -p local/iris-media local/iris-snapshots;
      exit 0"

  mock-model:
    build:
      context: ../backend
      dockerfile: ../deploy/mock-model.Dockerfile
    environment:
      MOCK_MODEL_ADDR: ":8900"
      MOCK_MODEL_MODALITY: "video"
    ports: ["8900:8900"]

  mock-model-image:
    build:
      context: ../backend
      dockerfile: ../deploy/mock-model.Dockerfile
    environment:
      MOCK_MODEL_ADDR: ":8901"
      MOCK_MODEL_MODALITY: "image"
    ports: ["8901:8901"]

  # keycloak: deferred — auth v0 is session-cookie against a seeded user (M1);
  # OSS IdP lands per plan §M8/backlog.

volumes:
  pgdata:
  miniodata:
