version: v2
plugins:
  # Go server/client (connect-go)
  - remote: buf.build/protocolbuffers/go
    out: ../backend/gen
    opt: paths=source_relative
  - remote: buf.build/connectrpc/go
    out: ../backend/gen
    opt: paths=source_relative
  # TypeScript client (connect-es) → generated package, never hand-edited
  - remote: buf.build/bufbuild/es
    out: ../web/packages/api-client/src/gen
    opt: target=ts
