syntax = "proto3";

package iris.v1;

import "iris/v1/common.proto";

option go_package = "github.com/awm33/iris/backend/gen/iris/v1;irisv1";

message Workspace {
  string id = 1;
  string name = 2;
  Timestamps timestamps = 15;
}

message Project {
  string id = 1;
  string workspace_id = 2;
  string name = 3;
  string description = 4;
  Timestamps timestamps = 15;
}

service WorkspaceService {
  rpc GetWorkspace(GetWorkspaceRequest) returns (GetWorkspaceResponse);
  rpc CreateProject(CreateProjectRequest) returns (CreateProjectResponse);
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
  rpc GetProject(GetProjectRequest) returns (GetProjectResponse);
  rpc UpdateProject(UpdateProjectRequest) returns (UpdateProjectResponse);
  rpc ArchiveProject(ArchiveProjectRequest) returns (ArchiveProjectResponse);
}

message GetWorkspaceRequest { string id = 1; }
message GetWorkspaceResponse { Workspace workspace = 1; }

message CreateProjectRequest {
  string workspace_id = 1;
  string name = 2;
  string description = 3;
}
message CreateProjectResponse { Project project = 1; }

message ListProjectsRequest {
  string workspace_id = 1;
  PageRequest page = 2;
}
message ListProjectsResponse {
  repeated Project projects = 1;
  PageResponse page = 2;
}

message GetProjectRequest { string id = 1; }
message GetProjectResponse { Project project = 1; }

message UpdateProjectRequest {
  string id = 1;
  optional string name = 2;
  optional string description = 3;
}
message UpdateProjectResponse { Project project = 1; }

message ArchiveProjectRequest { string id = 1; }
message ArchiveProjectResponse {}
