syntax = "proto3";

package iris.v1;

import "iris/v1/canvas.proto";
import "iris/v1/common.proto";

option go_package = "github.com/awm33/iris/backend/gen/iris/v1;irisv1";

// Timeline documents (M5): op-log docs on the same machinery as canvases —
// server-ordered gapless seqs, client-owned op vocabulary carried as JSON
// payloads (see web/packages/doc-runtime). Reuses canvas.proto's DocOp.

message Timeline {
  string id = 1;
  string project_id = 2;
  string doc_id = 3;
  string name = 4;
  int32 fps = 5;
  int64 head_seq = 6;
  Timestamps timestamps = 15;
}

service TimelineService {
  rpc CreateTimeline(CreateTimelineRequest) returns (CreateTimelineResponse);
  rpc ListTimelines(ListTimelinesRequest) returns (ListTimelinesResponse);
  rpc GetTimeline(GetTimelineRequest) returns (GetTimelineResponse);
  rpc AppendTimelineOps(AppendTimelineOpsRequest) returns (AppendTimelineOpsResponse);
  rpc DeleteTimeline(DeleteTimelineRequest) returns (DeleteTimelineResponse);
  // Export v1 (M7): server render of the timeline to H.264. The render is a
  // media job; the result lands as a library asset (version_id downloads
  // through the normal asset signing path).
  rpc StartExport(StartExportRequest) returns (StartExportResponse);
  rpc ListExports(ListExportsRequest) returns (ListExportsResponse);
  // Transcribe (M7): render the timeline's mixed audio server-side, run the
  // configured speech-to-text engine, and APPEND the result to the doc as
  // caption-track ops — this RPC only tracks lifecycle.
  rpc StartTranscription(StartTranscriptionRequest) returns (StartTranscriptionResponse);
  rpc ListTranscriptions(ListTranscriptionsRequest) returns (ListTranscriptionsResponse);
}

message Transcription {
  string id = 1;
  string timeline_id = 2;
  string state = 3; // queued | running | complete | failed
  string error = 4;
  int32 segment_count = 5; // captions appended (set when complete)
  Timestamps timestamps = 15;
}

message StartTranscriptionRequest { string timeline_id = 1; }
message StartTranscriptionResponse { Transcription transcription = 1; }
message ListTranscriptionsRequest { string timeline_id = 1; }
message ListTranscriptionsResponse { repeated Transcription transcriptions = 1; }

message Export {
  string id = 1;
  string timeline_id = 2;
  string preset = 3; // draft | master
  string state = 4;  // queued | running | complete | failed
  string error = 5;
  string asset_id = 6;   // set when complete
  string version_id = 7; // set when complete
  Timestamps timestamps = 15;
}

message StartExportRequest {
  string timeline_id = 1;
  string preset = 2; // "" = draft
}
message StartExportResponse { Export export = 1; }
message ListExportsRequest { string timeline_id = 1; }
message ListExportsResponse { repeated Export exports = 1; }

message CreateTimelineRequest {
  string project_id = 1;
  string name = 2;
  int32 fps = 3; // 0 = 24
}
message CreateTimelineResponse { Timeline timeline = 1; }
message ListTimelinesRequest { string project_id = 1; }
message ListTimelinesResponse { repeated Timeline timelines = 1; }
message GetTimelineRequest {
  string id = 1;
  int64 after_seq = 2;
}
message GetTimelineResponse {
  Timeline timeline = 1;
  repeated DocOp ops = 2;
}
message AppendTimelineOpsRequest {
  string timeline_id = 1;
  int64 base_seq = 2;
  repeated string payloads = 3;
}
message AppendTimelineOpsResponse { int64 head_seq = 1; }
message DeleteTimelineRequest { string id = 1; }
message DeleteTimelineResponse {}
