name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - run: cd proto && buf lint
      # breaking-change check vs main once the repo has history:
      # - run: cd proto && buf breaking --against '.git#branch=main,subdir=proto'

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum
      - run: cd backend && go vet ./... && go build ./... && go test ./...

  engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cd engine && cargo check --workspace && cargo test --workspace
      # Keep the WASM seam honest from day 0 (TDD §6):
      - run: cd engine && cargo check --workspace --target wasm32-unknown-unknown

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd web && pnpm install --no-frozen-lockfile && pnpm typecheck
